name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace --all-targets

  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        working-directory: math/go
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: math/go/go.sum

      - name: gofmt
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          working-directory: math/go
          install-go: false

      - name: test (with race detector)
        run: go test -race -count=1 ./...

  cross-build:
    name: Cross-compile sanity
    runs-on: ubuntu-latest
    needs: [rust, go]
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build rust core
        run: cargo zigbuild -p lunarbase-pmm-math --release --target ${{ matrix.target }}

      - name: Build napi addon
        run: cargo zigbuild -p lunarbase-pmm-math-node --release --target ${{ matrix.target }}

  examples:
    name: Examples smoke test
    runs-on: ubuntu-latest
    needs: [rust, go]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: |
            math/go/go.sum
            examples/minimal/go/go.sum
      - uses: Swatinem/rust-cache@v2
      - name: Rust minimal example
        run: cargo run --manifest-path examples/minimal/rust/Cargo.toml
      - name: Go minimal example
        run: |
          cd examples/minimal/go
          go mod tidy
          go run .

  audit:
    name: Security advisories (cargo-deny)
    runs-on: ubuntu-latest
    # Advisories are informational and shouldn't block merges; the job still
    # shows red on the PR if a vulnerable dep is in Cargo.lock.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
