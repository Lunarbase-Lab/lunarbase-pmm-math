# cargo-deny configuration. We only run `check advisories` from CI.
# See https://embarkstudios.github.io/cargo-deny/ for full schema.

[advisories]
yanked = "warn"
ignore = [
    # `paste` is unmaintained, pulled in transitively by alloy-sol-macro /
    # alloy-sol-types (used only by the offchain-quoting example crates,
    # not by the published math crates).
    "RUSTSEC-2024-0436",
]
